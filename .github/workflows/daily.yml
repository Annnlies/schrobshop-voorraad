name: Voorraad scrapen

on:
  schedule:
    - cron: '0 5 * * *'      # elke dag ~05:00 UTC (07:00 NL zomertijd)
  workflow_dispatch: {}        # knop om handmatig te draaien

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installeer dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Draai scraper
        env:
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: python scraper.py

      - name: Commit voorraad.csv
        run: |
          git config user.name "voorraad-bot"
          git config user.email "actions@users.noreply.github.com"
          git add voorraad.csv
          git commit -m "voorraad update $(date +%F)" || echo "geen wijziging"
          git push
